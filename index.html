<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Imposter Game – Free Indian Edition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1a1a2e; --bg2: #16213e;
      --card: #ffffff; --card-dark: rgba(255,255,255,0.06);
      --accent: #e94560; --primary: #6c63ff; --primary-dark: #5a52e0;
      --green: #2ecc71; --green-dark: #27ae60;
      --text: #1a1a2e; --text-light: #666; --text-white: #ffffff;
      --border: #e0e0e0; --shadow: 0 4px 20px rgba(0,0,0,0.12);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.18); --radius: 16px;
    }
    html, body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 50%, #0d1b2a 100%);
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text-white);
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(circle at 25% 25%, rgba(108,99,255,0.08) 0%, transparent 50%),
                  radial-gradient(circle at 75% 75%, rgba(233,69,96,0.06) 0%, transparent 50%);
    }
    #app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-bottom: 60px; }

    /* CONTAINER */
    .container { width: 100%; max-width: 480px; padding: 20px 16px; }

    /* HEADER */
    .app-header { text-align: center; padding: 36px 16px 16px; width: 100%; max-width: 480px; }
    .app-header h1 { font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg,#fff,rgba(255,255,255,0.7)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:6px; line-height:1.15; }
    .app-header .tagline { font-size: 0.9rem; color: rgba(255,255,255,0.5); line-height: 1.5; }

    /* CARDS */
    .card { background: var(--card); border-radius: var(--radius); padding: 18px; color: var(--text); box-shadow: var(--shadow); width: 100%; margin-bottom: 12px; }
    .card-dark { background: var(--card-dark); border: 1px solid rgba(255,255,255,0.10); border-radius: var(--radius); padding: 18px; color: var(--text-white); width: 100%; margin-bottom: 12px; backdrop-filter: blur(8px); }
    .card-title { font-size: 0.68rem; font-weight: 700; letter-spacing: 1.3px; text-transform: uppercase; color: var(--text-light); margin-bottom: 14px; }
    .card-dark .card-title { color: rgba(255,255,255,0.4); }

    /* BUTTONS */
    .btn { display:flex; align-items:center; justify-content:center; gap:8px; padding:14px 24px; border-radius:999px; font-family:inherit; font-size:1rem; font-weight:700; cursor:pointer; border:none; transition:transform .12s,box-shadow .12s,opacity .12s; width:100%; -webkit-tap-highlight-color:transparent; }
    .btn:active { transform:scale(0.97); opacity:.9; }
    .btn-primary { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#fff; box-shadow:0 4px 18px rgba(108,99,255,0.4); }
    .btn-green   { background:linear-gradient(135deg,var(--green),var(--green-dark)); color:#fff; box-shadow:0 4px 18px rgba(46,204,113,0.35); }
    .btn-red     { background:linear-gradient(135deg,var(--accent),#c0392b); color:#fff; box-shadow:0 4px 18px rgba(233,69,96,0.35); }
    .btn-ghost   { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.85); border:1.5px solid rgba(255,255,255,0.14); }
    .btn-ghost:hover { background:rgba(255,255,255,0.13); }
    .btn-sm { padding:8px 16px; font-size:0.85rem; width:auto; display:inline-flex; }

    /* COUNTER */
    .counter-row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; }
    .counter-label { font-size:0.95rem; font-weight:600; color:var(--text); }
    .card-dark .counter-label { color:rgba(255,255,255,0.85); }
    .counter-controls { display:flex; align-items:center; gap:12px; }
    .counter-btn { width:36px; height:36px; border-radius:50%; border:none; background:rgba(108,99,255,0.12); color:var(--primary); font-size:1.3rem; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s; -webkit-tap-highlight-color:transparent; }
    .counter-btn:hover { background:rgba(108,99,255,0.22); }
    .counter-val { font-size:1.5rem; font-weight:800; color:var(--primary); min-width:32px; text-align:center; }

    /* DIFFICULTY CHECKBOXES */
    .diff-check-row { display:flex; gap:8px; flex-wrap:wrap; }
    .diff-check-btn {
      flex:1; min-width:70px; padding:10px 8px; border-radius:12px; border:2px solid transparent;
      font-family:inherit; font-size:0.88rem; font-weight:700; cursor:pointer;
      transition:all .18s; text-align:center; -webkit-tap-highlight-color:transparent;
      background:#f0f0f5; color:#888;
    }
    .diff-check-btn.selected { border-color:var(--primary); background:rgba(108,99,255,0.12); color:var(--primary); }
    .diff-check-btn.easy.selected   { border-color:#2ecc71; background:rgba(46,204,113,0.12); color:#2ecc71; }
    .diff-check-btn.medium.selected { border-color:#f5a623; background:rgba(245,166,35,0.12); color:#f5a623; }
    .diff-check-btn.hard.selected   { border-color:#e94560; background:rgba(233,69,96,0.12); color:#e94560; }
    .diff-check-warn { font-size:0.78rem; color:#e94560; margin-top:8px; display:none; }
    .diff-check-warn.show { display:block; }

    /* TOGGLE SWITCH */
    .toggle-row { display:flex; align-items:center; justify-content:space-between; padding:6px 0; }
    .toggle-label-wrap { display:flex; flex-direction:column; }
    .toggle-label { font-size:0.95rem; font-weight:600; color:var(--text); }
    .toggle-sub   { font-size:0.78rem; color:var(--text-light); margin-top:2px; }
    .card-dark .toggle-label { color:rgba(255,255,255,0.85); }
    .card-dark .toggle-sub   { color:rgba(255,255,255,0.4); }
    .toggle { position:relative; width:46px; height:26px; flex-shrink:0; }
    .toggle input { opacity:0; width:0; height:0; }
    .toggle-slider { position:absolute; cursor:pointer; inset:0; background:#ccc; border-radius:999px; transition:.25s; }
    .toggle-slider::before { content:''; position:absolute; height:20px; width:20px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.25s; box-shadow:0 1px 4px rgba(0,0,0,0.2); }
    .toggle input:checked + .toggle-slider { background:var(--primary); }
    .toggle input:checked + .toggle-slider::before { transform:translateX(20px); }

    /* CATEGORY PILLS */
    .sel-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .link-btn { background:none; border:none; color:var(--primary); font-family:inherit; font-size:0.82rem; font-weight:700; cursor:pointer; padding:0; }
    .pill-grid { display:flex; flex-wrap:wrap; gap:7px; max-height:200px; overflow-y:auto; padding-bottom:2px; }
    .pill-grid::-webkit-scrollbar { width:3px; }
    .pill-grid::-webkit-scrollbar-thumb { background:rgba(108,99,255,0.3); border-radius:99px; }
    .pill { padding:6px 13px; border-radius:999px; font-size:0.78rem; font-weight:600; cursor:pointer; transition:all .15s; border:1.5px solid transparent; -webkit-tap-highlight-color:transparent; font-family:inherit; }
    .pill-off { background:#f0f0f5; color:#666; border-color:#e0e0e0; }
    .pill-on  { background:rgba(108,99,255,0.12); color:var(--primary); border-color:var(--primary); }

    /* DIVIDER */
    .divider { width:100%; height:1px; background:var(--border); margin:12px 0; }
    .divider-dark { width:100%; height:1px; background:rgba(255,255,255,0.08); margin:12px 0; }

    /* WORD REVEAL CARD */
    .word-reveal-card { background:linear-gradient(145deg,#1e1b4b,#312e81); border-radius:22px; padding:46px 28px 36px; text-align:center; border:2px solid rgba(255,255,255,0.1); cursor:pointer; transition:transform .2s; min-height:200px; display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:var(--shadow-lg); -webkit-tap-highlight-color:transparent; }
    .word-reveal-card:active { transform:scale(0.98); }
    .word-reveal-card.imposter-card { background:linear-gradient(145deg,#1c0010,#3d0020); border-color:rgba(233,69,96,0.3); }
    .word-big { font-size:2.8rem; font-weight:800; color:#fff; line-height:1.1; letter-spacing:-0.5px; }
    .word-cat-badge { display:inline-block; background:rgba(108,99,255,0.25); border:1px solid rgba(108,99,255,0.4); color:#a5b4fc; border-radius:999px; padding:4px 14px; font-size:0.75rem; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; margin-bottom:14px; }
    .word-cat-badge.hint-show { background:rgba(245,166,35,0.18); border-color:rgba(245,166,35,0.4); color:#fbbf24; }
    .word-imposter { font-size:2.8rem; font-weight:800; color:var(--accent); line-height:1.1; }
    .tap-hint { font-size:0.82rem; color:rgba(255,255,255,0.35); margin-top:18px; }

    /* PLAYER BADGE */
    .player-badge { display:inline-flex; align-items:center; gap:7px; background:rgba(108,99,255,0.15); border:1.5px solid rgba(108,99,255,0.35); color:#a5b4fc; border-radius:999px; padding:6px 18px; font-size:0.9rem; font-weight:700; }

    /* PROGRESS DOTS */
    .progress-dots { display:flex; gap:7px; justify-content:center; flex-wrap:wrap; }
    .dot { width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,0.15); transition:all .25s; }
    .dot-done   { background:var(--green); }
    .dot-active { background:var(--primary); transform:scale(1.4); box-shadow:0 0 8px rgba(108,99,255,0.6); }

    /* STATS */
    .flex-row { display:flex; gap:10px; width:100%; }
    .stat-box { flex:1; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:14px; padding:12px 8px; text-align:center; }
    .stat-val { font-size:1.4rem; font-weight:800; color:#fff; }
    .stat-lbl { font-size:0.68rem; color:rgba(255,255,255,0.45); margin-top:3px; }

    /* HOW TO PLAY */
    .how-list { list-style:none; padding:0; counter-reset:step; }
    .how-list li { padding:9px 0 9px 38px; position:relative; font-size:0.88rem; line-height:1.6; color:rgba(255,255,255,0.78); counter-increment:step; border-bottom:1px solid rgba(255,255,255,0.05); }
    .how-list li:last-child { border-bottom:none; }
    .how-list li::before { content:counter(step); position:absolute; left:0; top:9px; width:24px; height:24px; background:var(--primary); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.75rem; font-weight:800; color:#fff; }

    /* RESULT */
    .result-word-big { font-size:3rem; font-weight:800; color:#fff; text-align:center; line-height:1.1; letter-spacing:-1px; }
    .emoji-big { font-size:3.5rem; display:block; text-align:center; }

    /* ANIMATIONS */
    @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    @keyframes popIn  { 0%{transform:scale(0.5);opacity:0} 70%{transform:scale(1.08)} 100%{transform:scale(1);opacity:1} }
    .anim-in { animation:fadeUp .32s ease forwards; }
    .pop-in  { animation:popIn .4s cubic-bezier(0.34,1.56,0.64,1) forwards; }

    .mt-8{margin-top:8px} .mt-10{margin-top:10px} .mt-12{margin-top:12px}
    .footer-note { text-align:center; font-size:0.78rem; color:rgba(255,255,255,0.22); padding:16px; }
  </style>
</head>

/* ================================================================
   STATE
================================================================ */
const ALL_CATS = [...new Set(WORDS.map(w => w.c))];

let S = {
  screen: 'home',
  numPlayers: 4,
  numImposters: 1,
  selDiffs: ['Easy','Medium','Hard'],   // multi-select difficulty
  selCats: [...ALL_CATS],
  catHint: false,                        // show category to all players
  curPlayer: 0,
  imposterIdxs: [],
  secretWord: null,
  wordVisible: false,
};

/* ================================================================
   HELPERS
================================================================ */
function shuffle(a) {
  const b = [...a];
  for (let i = b.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [b[i],b[j]] = [b[j],b[i]];
  }
  return b;
}

function pickWord() {
  let pool = WORDS.filter(w => S.selCats.includes(w.c) && S.selDiffs.includes(w.d));
  if (!pool.length) pool = WORDS.filter(w => S.selCats.includes(w.c));
  if (!pool.length) pool = WORDS;
  return pool[Math.floor(Math.random()*pool.length)];
}

function startGame() {
  S.secretWord   = pickWord();
  S.imposterIdxs = shuffle(Array.from({length:S.numPlayers},(_,i)=>i)).slice(0,S.numImposters);
  S.curPlayer    = 0;
  S.wordVisible  = false;
  S.screen       = 'distribute';
  render();
}

/* ================================================================
   TINY DOM BUILDER
================================================================ */
function el(tag, p, ...kids) {
  const e = document.createElement(tag);
  if (p) for (const [k,v] of Object.entries(p)) {
    if (k==='className') e.className = v;
    else if (k==='style') Object.assign(e.style,v);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if (k==='html') e.innerHTML = v;
    else e.setAttribute(k,v);
  }
  kids.flat().forEach(c => { if(c==null)return; e.appendChild(typeof c==='string'?document.createTextNode(c):c); });
  return e;
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  ({home:renderHome,settings:renderSettings,distribute:renderDistribute,play:renderPlay,result:renderResult}[S.screen]||renderHome)()
    .forEach ? null : app.appendChild(({home:renderHome,settings:renderSettings,distribute:renderDistribute,play:renderPlay,result:renderResult}[S.screen]||renderHome)());
}
// Simpler:
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  const map = {home:renderHome,settings:renderSettings,distribute:renderDistribute,play:renderPlay,result:renderResult};
  app.appendChild((map[S.screen]||renderHome)());
}

/* ================================================================

================================================================ */
function renderHome() {
  const wrap = el('div',{className:'anim-in'});

  const hdr = el('div',{className:'app-header'});
  hdr.appendChild(el('h1',{},'🕵️ Imposter Game'));
  hdr.appendChild(el('p',{className:'tagline'},'Indian Edition · Free Forever · No Login Needed'));
  wrap.appendChild(hdr);

  const cont = el('div',{className:'container'});

  const how = el('div',{className:'card-dark'});
  how.appendChild(el('div',{className:'card-title'},'🎮 How to Play'));
  const ol = el('ol',{className:'how-list'});
  ['Everyone gets the <strong>secret word</strong> — except the Imposter who sees <strong>???</strong>',
   'Take turns giving a <strong>1-word clue</strong>. Don\'t be too obvious!',
   'Discuss and <strong>vote</strong> to find the Imposter.',
   'Imposter wins if not caught — or if they guess the word!'
  ].forEach(t => ol.appendChild(el('li',{html:t})));
  how.appendChild(ol);
  cont.appendChild(how);

  cont.appendChild(el('div',{style:{height:'8px'}}));
  cont.appendChild(el('button',{className:'btn btn-primary',onClick:startGame},'🚀 Start Game'));
  cont.appendChild(el('div',{style:{height:'8px'}}));
  cont.appendChild(el('button',{className:'btn btn-ghost',onClick:()=>{S.screen='settings';render();}},'⚙️ Settings & Categories'));

  wrap.appendChild(cont);
  return wrap;

/* ================================================================
   SETTINGS
================================================================ */
function renderSettings() {
  const wrap = el('div',{className:'anim-in'});

  const hdr = el('div',{className:'app-header'});
  hdr.appendChild(el('h1',{style:{fontSize:'1.9rem'}},'⚙️ Settings'));
  hdr.appendChild(el('p',{className:'tagline'},'Customize your game'));
  wrap.appendChild(hdr);

  const cont = el('div',{className:'container'});

  /* Players & Imposters */
  const pCard = el('div',{className:'card'});
  pCard.appendChild(el('div',{className:'card-title'},'👥 Players'));

  const pRow = el('div',{className:'counter-row'});
  pRow.appendChild(el('span',{className:'counter-label'},'Number of Players'));
  const pCtrl = el('div',{className:'counter-controls'});
  pCtrl.appendChild(el('button',{className:'counter-btn',onClick:()=>{if(S.numPlayers>3){S.numPlayers--;if(S.numImposters>=S.numPlayers)S.numImposters=S.numPlayers-1;render();}}},'-'));
  pCtrl.appendChild(el('span',{className:'counter-val'},String(S.numPlayers)));
  pCtrl.appendChild(el('button',{className:'counter-btn',onClick:()=>{if(S.numPlayers<12){S.numPlayers++;render();}}},'+'));
  pRow.appendChild(pCtrl);
  pCard.appendChild(pRow);
  pCard.appendChild(el('div',{className:'divider'}));

  const iRow = el('div',{className:'counter-row'});
  iRow.appendChild(el('span',{className:'counter-label'},'😈 Imposters'));
  const iCtrl = el('div',{className:'counter-controls'});
  iCtrl.appendChild(el('button',{className:'counter-btn',onClick:()=>{if(S.numImposters>1){S.numImposters--;render();}}},'-'));
  iCtrl.appendChild(el('span',{className:'counter-val'},String(S.numImposters)));
  iCtrl.appendChild(el('button',{className:'counter-btn',onClick:()=>{if(S.numImposters<Math.floor(S.numPlayers/2)){S.numImposters++;render();}}},'+'));
  iRow.appendChild(iCtrl);
  pCard.appendChild(iRow);
  cont.appendChild(pCard);

  /* Difficulty (multi-select checkboxes) */
  const dCard = el('div',{className:'card'});
  dCard.appendChild(el('div',{className:'card-title'},'⚡ Difficulty — Select All You Want'));

  const dRow = el('div',{className:'diff-check-row'});
  [['Easy','😊 Easy','easy'],['Medium','🔥 Medium','medium'],['Hard','💀 Hard','hard']].forEach(([val,lbl,cls]) => {
    const on = S.selDiffs.includes(val);
    dRow.appendChild(el('button',{
      className:`diff-check-btn ${cls}${on?' selected':''}`,
      onClick:()=>{
        if(on){ if(S.selDiffs.length>1) S.selDiffs=S.selDiffs.filter(d=>d!==val); }
        else S.selDiffs.push(val);
        render();
      }
    }, lbl));
  });
  dCard.appendChild(dRow);

  const warn = el('div',{className:`diff-check-warn${S.selDiffs.length===0?' show':''}` },'⚠ Select at least one difficulty.');
  dCard.appendChild(warn);
  cont.appendChild(dCard);

  /* Category Hint toggle */
  const hintCard = el('div',{className:'card'});
  hintCard.appendChild(el('div',{className:'card-title'},'💡 Options'));
  const tRow = el('div',{className:'toggle-row'});
  const tlw = el('div',{className:'toggle-label-wrap'});
  tlw.appendChild(el('span',{className:'toggle-label'},'Category Hint'));
  tlw.appendChild(el('span',{className:'toggle-sub'},'Show the category to all players (including the imposter)'));
  tRow.appendChild(tlw);
  const tog = el('label',{className:'toggle'});
  const inp = el('input',{type:'checkbox'});
  if(S.catHint) inp.checked = true;
  inp.addEventListener('change',()=>{ S.catHint=inp.checked; });
  tog.appendChild(inp);
  tog.appendChild(el('span',{className:'toggle-slider'}));
  tRow.appendChild(tog);
  hintCard.appendChild(tRow);
  cont.appendChild(hintCard);

  /* Categories */
  const cCard = el('div',{className:'card'});
  const sr = el('div',{className:'sel-row'});
  sr.appendChild(el('div',{className:'card-title',style:{margin:0}},'📚 Word Categories'));
  const allOn = S.selCats.length === ALL_CATS.length;
  sr.appendChild(el('button',{className:'link-btn',onClick:()=>{S.selCats=allOn?[ALL_CATS[0]]:[...ALL_CATS];render();}}, allOn?'Deselect All':'Select All'));
  cCard.appendChild(sr);

  const pg = el('div',{className:'pill-grid'});
  ALL_CATS.forEach(cat => {
    const on = S.selCats.includes(cat);
    pg.appendChild(el('button',{
      className:`pill ${on?'pill-on':'pill-off'}`,
      onClick:()=>{
        if(on){ if(S.selCats.length>1) S.selCats=S.selCats.filter(c=>c!==cat); }
        else S.selCats.push(cat);
        render();
      }
    }, (on?'✓ ':'')+cat));
  });
  cCard.appendChild(pg);
  cont.appendChild(cCard);

  cont.appendChild(el('div',{style:{height:'8px'}}));
  cont.appendChild(el('button',{className:'btn btn-green',onClick:startGame},'🎯 Start Game!'));
  cont.appendChild(el('div',{style:{height:'8px'}}));
  cont.appendChild(el('button',{className:'btn btn-ghost',onClick:()=>{S.screen='home';render();}},'← Back'));
  wrap.appendChild(cont);
  return wrap;
}

/* ================================================================
   DISTRIBUTE
================================================================ */
function renderDistribute() {
  const wrap = el('div',{className:'anim-in'});
  const hdr = el('div',{className:'app-header'});

  const dots = el('div',{className:'progress-dots',style:{marginBottom:'14px'}});
  for(let i=0;i<S.numPlayers;i++){
    dots.appendChild(el('div',{className:'dot'+(i<S.curPlayer?' dot-done':i===S.curPlayer?' dot-active':'')}));
  }
  hdr.appendChild(dots);

  const badge = el('div',{style:{textAlign:'center',marginBottom:'8px'}});
  badge.appendChild(el('span',{className:'player-badge'},`👤 Player ${S.curPlayer+1}`));
  hdr.appendChild(badge);
  hdr.appendChild(el('h1',{style:{fontSize:'1.7rem'}},"Your turn to look"));
  hdr.appendChild(el('p',{className:'tagline'},"Don't show anyone else!"));
  wrap.appendChild(hdr);

  const cont = el('div',{className:'container'});

  if(!S.wordVisible) {
    const card = el('div',{className:'word-reveal-card',onClick:()=>{S.wordVisible=true;render();}});
    card.appendChild(el('span',{style:{fontSize:'3.5rem'}},'🔒'));
    card.appendChild(el('div',{className:'word-big',style:{marginTop:'12px',color:'rgba(255,255,255,0.85)'}},'Tap to reveal'));
    card.appendChild(el('div',{className:'tap-hint'},`Only Player ${S.curPlayer+1} should look`));
    cont.appendChild(card);
  } else {
    const isImp = S.imposterIdxs.includes(S.curPlayer);
    const card = el('div',{className:`word-reveal-card${isImp?' imposter-card':''}`});

    if(isImp){
      // Category hint for imposter too if enabled
      if(S.catHint){
        card.appendChild(el('div',{className:'word-cat-badge hint-show'},`📚 ${S.secretWord.c}`));
      }
      card.appendChild(el('span',{style:{fontSize:'3.5rem'}},'😈'));
      card.appendChild(el('div',{className:'word-imposter',style:{marginTop:'10px'}},'???'));
      card.appendChild(el('div',{className:'tap-hint',style:{marginTop:'12px'}},'You are the IMPOSTER — blend in! 🎭'));
    } else {
      if(S.catHint){
        card.appendChild(el('div',{className:'word-cat-badge'},`📚 ${S.secretWord.c}`));
      }
      card.appendChild(el('div',{className:'word-big'},S.secretWord.w));
      card.appendChild(el('div',{className:'tap-hint',style:{marginTop:'12px'}},'Remember this word! 🧠'));
    }
    cont.appendChild(card);
    cont.appendChild(el('div',{style:{height:'16px'}}));

    const isLast = S.curPlayer===S.numPlayers-1;
    cont.appendChild(el('button',{
      className: isLast?'btn btn-green':'btn btn-primary',
      onClick:()=>{
        if(!isLast){S.curPlayer++;S.wordVisible=false;render();}
        else{S.screen='play';render();}
      }
    }, isLast?'✅ Everyone is ready — Start!': `Pass to Player ${S.curPlayer+2} →`));
  }

  wrap.appendChild(cont);
  return wrap;
}

/* ================================================================
   PLAY
================================================================ */
function renderPlay() {
  const wrap = el('div',{className:'anim-in'});

  const hdr = el('div',{className:'app-header'});
  hdr.appendChild(el('span',{className:'emoji-big'},'🕵️'));
  hdr.appendChild(el('h1',{style:{fontSize:'1.9rem'}},'Clue Time!'));
  hdr.appendChild(el('p',{className:'tagline'},'Each player gives a 1-word clue. The imposter is listening…'));
  wrap.appendChild(hdr);

  const cont = el('div',{className:'container'});

  const statsRow = el('div',{className:'flex-row',style:{marginBottom:'12px'}});
  [{icon:'👥',lbl:'Players',val:S.numPlayers},{icon:'😈',lbl:'Imposters',val:S.numImposters}].forEach(s=>{
    const b = el('div',{className:'stat-box'});
    b.appendChild(el('div',{style:{fontSize:'1.5rem'}},s.icon));
    b.appendChild(el('div',{className:'stat-val'},String(s.val)));
    b.appendChild(el('div',{className:'stat-lbl'},s.lbl));
    statsRow.appendChild(b);
  });
  // Category hint stat box
  if(S.catHint){
    const b = el('div',{className:'stat-box'});
    b.appendChild(el('div',{style:{fontSize:'1.5rem'}},'📚'));
    b.appendChild(el('div',{className:'stat-val',style:{fontSize:'0.9rem',lineHeight:'1.3'}},S.secretWord.c));
    b.appendChild(el('div',{className:'stat-lbl'},'Category'));
    statsRow.appendChild(b);
  }
  cont.appendChild(statsRow);

  const rules = el('div',{className:'card-dark'});
  rules.appendChild(el('div',{className:'card-title'},'📋 Reminder'));
  const ol = el('ol',{className:'how-list'});
  ['Each player says ONE word as a clue — don\'t say the secret word!',
   'Don\'t be too obvious, the imposter is trying to blend in',
   'After all clues, discuss who you think is the Imposter',
   'Vote — if the Imposter is not caught, they win!'
  ].forEach(t=>ol.appendChild(el('li',{html:t})));
  rules.appendChild(ol);
  cont.appendChild(rules);

  cont.appendChild(el('div',{style:{height:'10px'}}));
  cont.appendChild(el('button',{className:'btn btn-red',onClick:()=>{S.screen='result';render();}},'🎲 Reveal the Word!'));
  cont.appendChild(el('div',{style:{height:'8px'}}));
  cont.appendChild(el('button',{className:'btn btn-ghost',onClick:startGame},'🔄 New Round'));
  cont.appendChild(el('div',{style:{height:'8px'}}));
  cont.appendChild(el('button',{className:'btn btn-ghost',onClick:()=>{S.screen='settings';render();}},'⚙️ Change Settings'));

  wrap.appendChild(cont);
  return wrap;
}

/* ================================================================
   RESULT
================================================================ */
function renderResult() {
  const wrap = el('div',{className:'anim-in'});

  const hdr = el('div',{className:'app-header'});
  hdr.appendChild(el('span',{className:'emoji-big pop-in'},'🎉'));
  hdr.appendChild(el('h1',{style:{fontSize:'1.5rem',marginBottom:'4px'}},'The secret word was…'));
  hdr.appendChild(el('div',{className:'result-word-big',style:{marginBottom:'6px'}},S.secretWord.w));

  const cont = el('div',{className:'container'});

  impCard.appendChild(el('div',{style:{fontSize:'0.85rem',color:'rgba(255,255,255,0.45)'}},'Did you catch them? 🔍'));
  cont.appendChild(impCard);

  cont.appendChild(el('button',{className:'btn btn-green',style:{marginBottom:'8px'},onClick:startGame},'🔄 Play Again'));
  cont.appendChild(el('button',{className:'btn btn-primary',style:{marginBottom:'8px'},onClick:()=>{S.screen='settings';render();}},'⚙️ Change Settings'));
  cont.appendChild(el('button',{className:'btn btn-ghost',onClick:()=>{S.screen='home';render();}},'🏠 Home'));

  wrap.appendChild(cont);
  return wrap;
}
